    function getTagStyle(tag) {
      return TAG_COLORS[tag] || { bg: "#f4f4f2", border: "#888", text: "#555" };
    }

    const EMPTY_FORM = {
      title: "", authors: "", year: "", journal: "", url: "", summary: "",
      tags: [], customTag: "", pinned: false,
    };

    function AddPaperModal({ onClose, onAdd, allTags }) {
      const [form, setForm] = useState(EMPTY_FORM);
      const [errors, setErrors] = useState({});
      const overlayRef = useRef(null);

      useEffect(() => {
        const handler = (e) => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", handler);
        return () => document.removeEventListener("keydown", handler);
      }, [onClose]);

      const set = (field, val) => setForm((f) => ({ ...f, [field]: val }));

      const toggleTag = (tag) => {
        setForm((f) => ({
          ...f,
          tags: f.tags.includes(tag) ? f.tags.filter((t) => t !== tag) : [...f.tags, tag],
        }));
      };

      const addCustomTag = () => {
        const t = form.customTag.trim();
        if (t && !form.tags.includes(t)) {
          setForm((f) => ({ ...f, tags: [...f.tags, t], customTag: "" }));
        }
      };

      const validate = () => {
        const e = {};
        if (!form.title.trim()) e.title = "Title is required.";
        if (form.tags.length === 0) e.tags = "Add at least one tag.";
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const submit = (e) => {
        e.preventDefault();
        if (!validate()) return;
        onAdd({
          title: form.title.trim(),
          authors: form.authors.trim() || "Authors not listed",
          year: form.year ? parseInt(form.year, 10) : null,
          journal: form.journal.trim() || "Preprint",
          url: form.url.trim() || null,
          summary: form.summary.trim(),
          tags: form.tags,
          pinned: form.pinned,
        });
        onClose();
      };

      const labelStyle = {
        fontFamily: "'Libre Franklin', sans-serif",
        fontSize: 12,
        fontWeight: 600,
        color: "#4a4840",
        letterSpacing: "0.5px",
        textTransform: "uppercase",
        display: "block",
        marginBottom: 6,
      };

      const errorStyle = {
        fontFamily: "'Libre Franklin', sans-serif",
        fontSize: 12,
        color: "#b83a3a",
        marginTop: 4,
      };

      return (
        <div
          ref={overlayRef}
          onClick={(e) => { if (e.target === overlayRef.current) onClose(); }}
          style={{
            position: "fixed", inset: 0, background: "rgba(28,26,22,0.55)",
            zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center",
            backdropFilter: "blur(2px)", padding: 20,
          }}
        >
          <div
            className="modal-inner"
            style={{
              background: "#fff",
              borderRadius: 12,
              padding: "36px 40px",
              width: "100%",
              maxWidth: 620,
              maxHeight: "90vh",
              overflowY: "auto",
              boxShadow: "0 24px 60px rgba(0,0,0,0.18)",
              animation: "modalIn 0.25s ease both",
              position: "relative",
            }}
          >

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>

                <p style={{ fontFamily: "'Libre Franklin', sans-serif", fontSize: 11, letterSpacing: "3px", textTransform: "uppercase", color: "#1e3a5c", fontWeight: 600, marginBottom: 4 }}>New Entry</p>
                <h2 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 24, fontWeight: 700, color: "#1a1a18", lineHeight: 1.2 }}>Add a Paper</h2>
              </div>
              <button
                onClick={onClose}
                style={{ background: "none", border: "none", cursor: "pointer", color: "#9a9690", padding: 4, lineHeight: 1, fontSize: 22, marginTop: -4 }}
                aria-label="Close"
              >&times;</button>
            </div>

            <form onSubmit={submit}>
              {/* Title */}
              <div style={{ marginBottom: 20 }}>
                <label style={labelStyle}>Title <span style={{ color: "#b83a3a" }}>*</span></label>
                <input className="form-input" type="text" placeholder="Full paper title" value={form.title} onChange={(e) => set("title", e.target.value)} />
                {errors.title && <p style={errorStyle}>{errors.title}</p>}
              </div>

              {/* Authors */}
              <div style={{ marginBottom: 20 }}>
                <label style={labelStyle}>Authors</label>
                <input className="form-input" type="text" placeholder="Last, F., & Last, F." value={form.authors} onChange={(e) => set("authors", e.target.value)} />
              </div>

              {/* Year + Journal row */}
              <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
                <div style={{ flex: "0 0 110px" }}>
                  <label style={labelStyle}>Year</label>
                  <input className="form-input" type="number" placeholder="2025" min="2000" max="2100" value={form.year} onChange={(e) => set("year", e.target.value)} />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Journal / Venue</label>
                  <input className="form-input" type="text" placeholder="e.g. FAccT 2025, Preprint" value={form.journal} onChange={(e) => set("journal", e.target.value)} />
                </div>
              </div>

              {/* URL */}
              <div style={{ marginBottom: 20 }}>
                <label style={labelStyle}>URL <span style={{ fontWeight: 400, color: "#9a9690", textTransform: "none", letterSpacing: 0 }}>(optional)</span></label>
                <input className="form-input" type="url" placeholder="https://arxiv.org/abs/..." value={form.url} onChange={(e) => set("url", e.target.value)} />
              </div>

              {/* Summary */}
              <div style={{ marginBottom: 20 }}>
                <label style={labelStyle}>Summary</label>
                <textarea className="form-input" placeholder="Brief annotation or abstract..." value={form.summary} onChange={(e) => set("summary", e.target.value)} />
              </div>

              {/* Tags */}
              <div style={{ marginBottom: 20 }}>
                <label style={labelStyle}>Tags <span style={{ color: "#b83a3a" }}>*</span></label>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 10 }}>
                  {allTags.map((tag) => {
                    const active = form.tags.includes(tag);
                    const s = getTagStyle(tag);
                    return (
                      <button
                        key={tag}
                        type="button"
                        onClick={() => toggleTag(tag)}
                        style={{
                          padding: "4px 12px",
                          borderRadius: 20,
                          border: "1px solid " + (active ? s.border : "#d0cdc6"),
                          background: active ? s.bg : "transparent",
                          color: active ? s.text : "#8a8680",
                          fontSize: 12,
                          fontFamily: "'Libre Franklin', sans-serif",
                          cursor: "pointer",
                          fontWeight: active ? 600 : 400,
                          transition: "all 0.15s",
                        }}
                      >{tag}</button>
                    );
                  })}
                </div>
                {/* Custom tag input */}
                <div style={{ display: "flex", gap: 8 }}>
                  <input
                    className="form-input"
                    type="text"
                    placeholder="Or type a new tag..."
                    value={form.customTag}
                    onChange={(e) => set("customTag", e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addCustomTag(); } }}
                    style={{ flex: 1 }}
                  />
                  <button
                    type="button"
                    onClick={addCustomTag}
                    style={{
                      padding: "10px 16px",
                      borderRadius: 6,
                      border: "1px solid #d8d5ce",
                      background: "#f8f7f4",
                      color: "#4a4840",
                      fontSize: 13,
                      fontFamily: "'Libre Franklin', sans-serif",
                      cursor: "pointer",
                      whiteSpace: "nowrap",
                    }}
                  >Add tag</button>
                </div>
                {/* Selected custom tags */}
                {form.tags.filter(t => !allTags.includes(t)).length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginTop: 8 }}>
                    {form.tags.filter(t => !allTags.includes(t)).map(tag => (
                      <span
                        key={tag}
                        style={{ padding: "4px 10px", borderRadius: 20, background: "#f4f4f2", border: "1px solid #888", color: "#555", fontSize: 12, fontFamily: "'Libre Franklin', sans-serif", display: "flex", alignItems: "center", gap: 6 }}
                      >
                        {tag}
                        <button type="button" onClick={() => setForm(f => ({ ...f, tags: f.tags.filter(t => t !== tag) }))} style={{ background: "none", border: "none", cursor: "pointer", color: "#888", fontSize: 14, padding: 0, lineHeight: 1 }}>&times;</button>
                      </span>
                    ))}
                  </div>
                )}
                {errors.tags && <p style={errorStyle}>{errors.tags}</p>}
              </div>

              {/* CIND Speaker toggle */}
              <div style={{ marginBottom: 28, display: "flex", alignItems: "center", gap: 10 }}>
                <input
                  id="pinnedCheck"
                  type="checkbox"
                  checked={form.pinned}
                  onChange={(e) => set("pinned", e.target.checked)}
                  style={{ width: 16, height: 16, cursor: "pointer", accentColor: "#1e3a5c" }}
                />
                <label htmlFor="pinnedCheck" style={{ fontFamily: "'Libre Franklin', sans-serif", fontSize: 13, color: "#4a4840", cursor: "pointer" }}>
                  Mark as CIND Speaker paper
                </label>
              </div>

              {/* Actions */}
              <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
                <button
                  type="button"
                  onClick={onClose}
                  style={{
                    padding: "10px 22px",
                    borderRadius: 6,
                    border: "1px solid #d8d5ce",
                    background: "transparent",
                    color: "#6b6860",
                    fontSize: 14,
                    fontFamily: "'Libre Franklin', sans-serif",
                    cursor: "pointer",
                  }}
                >Cancel</button>
                <button
                  type="submit"
                  style={{
                    padding: "10px 22px",
                    borderRadius: 6,
                    border: "none",
                    background: "#1e3a5c",
                    color: "#fff",
                    fontSize: 14,
                    fontFamily: "'Libre Franklin', sans-serif",
                    fontWeight: 500,
                    cursor: "pointer",
                    boxShadow: "0 2px 8px rgba(30,58,92,0.18)",
                  }}
                >Add Paper</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function Dashboard() {
      const [papers, setPapers] = useState(INITIAL_PAPERS);
      const [sort, setSort] = useState("year-desc");
      const [activeTags, setActiveTags] = useState([]);
      const [search, setSearch] = useState("");
      const [expandedId, setExpandedId] = useState(null);
      const [showForm, setShowForm] = useState(false);

      const allTags = useMemo(
        () => [...new Set([...KNOWN_TAGS, ...papers.flatMap((p) => p.tags)])].sort(),
        [papers]
      );

      const toggleTag = (tag) => {
        setActiveTags((prev) =>
          prev.includes(tag) ? prev.filter((t) => t !== tag) : [...prev, tag]
        );
      };

      const handleAdd = (data) => {
        const newId = Math.max(...papers.map((p) => p.id), 0) + 1;
        setPapers((prev) => [...prev, { id: newId, ...data }]);
      };

      const filtered = useMemo(() => {
        let result = papers;
        if (activeTags.length > 0) {
          result = result.filter((p) =>
            activeTags.some((t) => p.tags.includes(t))
          );
        }
        if (search.trim()) {
          const q = search.toLowerCase();
          result = result.filter(
            (p) =>
              p.title.toLowerCase().includes(q) ||
              p.authors.toLowerCase().includes(q) ||
              p.summary.toLowerCase().includes(q) ||
              p.journal.toLowerCase().includes(q)
          );
        }
        const [field, dir] = sort.split("-");
        result = [...result].sort((a, b) => {
          if (a.pinned && !b.pinned) return -1;
          if (!a.pinned && b.pinned) return 1;
          let cmp;
          if (field === "year") {
            cmp = (a.year ?? 0) - (b.year ?? 0);
          } else if (field === "title") {
            cmp = a.title.localeCompare(b.title);
          } else {
            cmp = a.authors.localeCompare(b.authors);
          }
          return dir === "desc" ? -cmp : cmp;
        });
        return result;
      }, [activeTags, search, sort, papers]);

      return (
        <div style={{ minHeight: "100vh" }}>
          {showForm && (
            <AddPaperModal
              onClose={() => setShowForm(false)}
              onAdd={handleAdd}
              allTags={allTags}
            />
          )}

          {/* Header */}
          <header style={{ borderBottom: "2px solid #1e3a5c", background: "#fff" }}>
            <div className="dashboard-container header-inner" style={{ maxWidth: 1600, margin: "0 auto", paddingTop: 52, paddingBottom: 36 }}>
              <p style={{
                fontFamily: "'Libre Franklin', sans-serif",
                fontSize: 11, letterSpacing: "3.5px", textTransform: "uppercase",
                color: "#1e3a5c", marginBottom: 12, fontWeight: 600,
              }}>Project Dashboard</p>
              <h1 style={{
                fontFamily: "'Source Serif 4', Georgia, serif",
                fontSize: "clamp(30px, 4vw, 46px)", fontWeight: 700,
                lineHeight: 1.12, margin: 0, color: "#1a1a18", maxWidth: 760,
              }}>
                LLMs and Content Moderation
              </h1>
              <p style={{
                fontFamily: "'Libre Franklin', sans-serif",
                fontSize: 14, color: "#4a4840", marginTop: 10, marginBottom: 0,
                lineHeight: 1.5, fontWeight: 400,
              }}>
                A project of the{" "}
                <a href="https://infodem.upenn.edu/" target="_blank" rel="noopener noreferrer" style={{ color: "#1e3a5c", textDecoration: "underline", textUnderlineOffset: 3 }}>
                  Penn Center on Media, Technology, and Democracy
                </a>
              </p>
              <p style={{
                fontFamily: "'Libre Franklin', sans-serif",
                fontSize: 17, color: "#6b6860", margin: "14px 0 0", maxWidth: 860,
                lineHeight: 1.7, fontWeight: 300,
              }}>
                Containing {papers.length} papers, this annotated bibliography maps the emerging research on LLM-based content moderation. Content moderation is critical to maintaining safe online spaces, and platforms have increasingly turned to large language models to assist with and automate moderation decisions. This collection examines prevalent approaches to optimizing LLMs for moderation \u2014 through policy-as-prompt frameworks, fine-tuned small models, and dedicated moderation endpoints \u2014 alongside papers that highlight concerns about algorithmic arbitrariness, bias, and censorship. The shift toward LLM-based moderation raises questions spanning technical performance, platform governance, worker wellbeing, and public trust.
              </p>
            </div>
          </header>

          {/* Controls */}
          <div className="dashboard-container" style={{ maxWidth: 1600, margin: "0 auto", paddingTop: 28, paddingBottom: 0 }}>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 20, alignItems: "center" }}>
              {/* Search */}
              <div style={{ position: "relative", flex: "1 1 280px", maxWidth: 420 }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9a9690" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}>
                  <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
                </svg>
                <input
                  type="text"
                  placeholder="Search titles, authors, or content."
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  style={{
                    width: "100%", padding: "11px 14px 11px 40px",
                    borderRadius: 6, border: "1px solid #d8d5ce", background: "#fff",
                    color: "#2c2a26", fontSize: 14, fontFamily: "'Libre Franklin', sans-serif",
                    fontWeight: 400, outline: "none", transition: "border-color 0.2s",
                  }}
                  onFocus={(e) => e.target.style.borderColor = "#1e3a5c"}
                  onBlur={(e) => e.target.style.borderColor = "#d8d5ce"}
                />
              </div>

              {/* Sort */}
              <select
                value={sort}
                onChange={(e) => setSort(e.target.value)}
                style={{
                  padding: "11px 32px 11px 14px", borderRadius: 6,
                  border: "1px solid #d8d5ce", background: "#fff",
                  color: "#4a4840", fontSize: 13, fontFamily: "'Libre Franklin', sans-serif",
                  cursor: "pointer", outline: "none",
                  WebkitAppearance: "none", MozAppearance: "none", appearance: "none",
                  backgroundImage: "url(\"data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%239a9690' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E\")",
                  backgroundRepeat: "no-repeat", backgroundPosition: "right 12px center",
                }}
              >
                {SORT_OPTIONS.map((o) => (
                  <option key={o.value} value={o.value}>{o.label}</option>
                ))}
              </select>

              {/* Add Paper button */}
              <button
                onClick={() => setShowForm(true)}
                style={{
                  display: "inline-flex", alignItems: "center", gap: 8,
                  padding: "11px 18px", borderRadius: 6, border: "none",
                  background: "#1e3a5c", color: "#fff",
                  fontSize: 13, fontFamily: "'Libre Franklin', sans-serif",
                  fontWeight: 500, cursor: "pointer",
                  boxShadow: "0 2px 8px rgba(30,58,92,0.18)",
                  transition: "background 0.2s, box-shadow 0.2s",
                  whiteSpace: "nowrap",
                }}
                onMouseEnter={e => { e.currentTarget.style.background = "#16304e"; e.currentTarget.style.boxShadow = "0 4px 14px rgba(30,58,92,0.28)"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "#1e3a5c"; e.currentTarget.style.boxShadow = "0 2px 8px rgba(30,58,92,0.18)"; }}
              >
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Paper
              </button>
            </div>

            {/* Tag filters */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 8 }}>
              {allTags.map((tag) => {
                const active = activeTags.includes(tag);
                const s = getTagStyle(tag);
                return (
                  <button
                    key={tag}
                    onClick={() => toggleTag(tag)}
                    style={{
                      padding: "5px 14px", borderRadius: 20,
                      border: "1px solid " + (active ? s.border : "#d0cdc6"),
                      background: active ? s.bg : "transparent",
                      color: active ? s.text : "#8a8680",
                      fontSize: 12, fontFamily: "'Libre Franklin', sans-serif",
                      cursor: "pointer", transition: "all 0.2s",
                      fontWeight: active ? 600 : 400,
                    }}
                  >{tag}</button>
                );
              })}
              {activeTags.length > 0 && (
                <button
                  onClick={() => setActiveTags([])}
                  style={{
                    padding: "5px 14px", borderRadius: 20, border: "1px solid #d0cdc6",
                    background: "transparent", color: "#1e3a5c", fontSize: 12,
                    fontFamily: "'Libre Franklin', sans-serif", fontWeight: 500, cursor: "pointer",
                  }}
                >Clear all &times;</button>
              )}
            </div>

            <p style={{ fontSize: 12, color: "#9a9690", margin: "12px 0 0", fontFamily: "'Libre Franklin', sans-serif" }}>
              Showing {filtered.length} of {papers.length} papers
            </p>
          </div>

          {/* Cards */}
          <div className="dashboard-container cards-grid" style={{ maxWidth: 1600, margin: "0 auto", paddingTop: 24, paddingBottom: 60 }}>
            {filtered.length === 0 && (
              <div style={{ textAlign: "center", padding: "80px 20px", color: "#9a9690", fontSize: 15, fontFamily: "'Libre Franklin', sans-serif", gridColumn: "1 / -1" }}>
                <p style={{ fontSize: 32, marginBottom: 12 }}>&empty;</p>
                No papers match your current filters.
              </div>
            )}

            {filtered.map((paper, idx) => {
              const expanded = expandedId === paper.id;
              return (
                <div
                  key={paper.id}
                  onClick={() => setExpandedId(expanded ? null : paper.id)}
                  style={{
                    background: paper.pinned ? "#fffdf5" : "#fff",
                    border: "1px solid " + (paper.pinned ? "#e8d98a" : "#e4e1da"),
                    borderRadius: 8, padding: "24px 28px", cursor: "pointer",
                    transition: "all 0.25s ease",
                    borderLeft: "3px solid " + (paper.pinned ? "#c9a800" : getTagStyle(paper.tags[0]).border),
                    animation: "fadeSlideIn 0.4s ease both",
                    animationDelay: (idx * 40) + "ms",
                    boxShadow: paper.pinned ? "0 2px 8px rgba(180,150,0,0.10)" : "0 1px 3px rgba(0,0,0,0.04)",
                  }}
                  onMouseEnter={(e) => {
                    e.currentTarget.style.boxShadow = paper.pinned ? "0 4px 14px rgba(180,150,0,0.18)" : "0 2px 8px rgba(0,0,0,0.07)";
                    e.currentTarget.style.borderColor = paper.pinned ? "#d4b800" : "#ccc9c2";
                  }}
                  onMouseLeave={(e) => {
                    e.currentTarget.style.boxShadow = paper.pinned ? "0 2px 8px rgba(180,150,0,0.10)" : "0 1px 3px rgba(0,0,0,0.04)";
                    e.currentTarget.style.borderColor = paper.pinned ? "#e8d98a" : "#e4e1da";
                  }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                      <span style={{ fontFamily: "'Libre Franklin', sans-serif", fontSize: 11, letterSpacing: "1.5px", textTransform: "uppercase", color: "#9a9690", fontWeight: 500 }}>{paper.journal}</span>
                      {paper.pinned && (
                        <span style={{ fontFamily: "'Libre Franklin', sans-serif", fontSize: 10, letterSpacing: "1.5px", textTransform: "uppercase", fontWeight: 700, color: "#8a6a00", background: "#fef3c0", border: "1px solid #e8d98a", borderRadius: 4, padding: "2px 7px" }}>CIND Speaker</span>
                      )}
                    </div>
                    {paper.year && (
                      <span style={{ fontFamily: "'Source Serif 4', serif", fontSize: 17, fontWeight: 700, color: getTagStyle(paper.tags[0]).border, opacity: 0.55 }}>{paper.year}</span>
                    )}
                  </div>

                  <h2 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: "clamp(17px, 2vw, 20px)", fontWeight: 600, lineHeight: 1.35, margin: "0 0 8px" }}>
                    {paper.url ? (
                      <a
                        href={paper.url}
                        target="_blank"
                        rel="noopener noreferrer"
                        onClick={e => e.stopPropagation()}
                        style={{ color: "#1a1a18", textDecoration: "underline", textDecorationColor: "#c0bdb7", textUnderlineOffset: 3, transition: "color 0.15s" }}
                        onMouseEnter={e => { e.currentTarget.style.color = "#1e3a5c"; e.currentTarget.style.textDecorationColor = "#1e3a5c"; }}
                        onMouseLeave={e => { e.currentTarget.style.color = "#1a1a18"; e.currentTarget.style.textDecorationColor = "#c0bdb7"; }}
                      >{paper.title}</a>
                    ) : paper.title}
                  </h2>

                  <p style={{ fontFamily: "'Libre Franklin', sans-serif", fontSize: 13, color: "#8a8680", margin: "0 0 14px", lineHeight: 1.4, fontWeight: 400 }}>{paper.authors}</p>

                  {paper.summary && (
                    <p style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 14, color: expanded ? "#3a3830" : "#6b6860", lineHeight: 1.75, margin: "0 0 16px", maxHeight: expanded ? 600 : 120, overflow: "hidden", transition: "all 0.35s ease" }}>
                      {paper.summary}
                    </p>
                  )}

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {paper.tags.map((tag) => {
                        const s = getTagStyle(tag);
                        return (
                          <span key={tag} style={{ padding: "3px 10px", borderRadius: 12, background: s.bg, color: s.text, fontSize: 11, fontWeight: 500, fontFamily: "'Libre Franklin', sans-serif", border: "1px solid " + s.border + "30" }}>{tag}</span>
                        );
                      })}
                    </div>
                    {paper.summary && (
                      <span style={{ fontSize: 11, color: "#b0ada6", transition: "transform 0.3s", transform: expanded ? "rotate(180deg)" : "rotate(0)", display: "inline-block", flexShrink: 0, marginLeft: 8 }}>{"\u25BC"}</span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>

  <script>
    function sendHeight() {
      var height = document.documentElement.scrollHeight;
      window.parent.postMessage({ frameHeight: height }, "*");
    }
    window.addEventListener("load", sendHeight);
    var observer = new ResizeObserver(sendHeight);
    observer.observe(document.body);
  </script>
</body>
</html>
